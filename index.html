<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Academy | AI for Real Estate Pros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0D5C63;
            --coral: #FF6B6B;
            --navy: #1A2B4C;
            --offwhite: #F8F9FA;
            --gray: #6B7280;
            --light-gray: #E5E7EB;
            --white: #FFFFFF;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--navy);
            background: var(--white);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--light-gray);
            z-index: 1000;
            transition: box-shadow 0.3s ease;
        }

        header.scrolled {
            box-shadow: var(--shadow);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--navy);
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--teal);
        }

        .mobile-menu {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Hero */
        .hero {
            padding: 80px 0;
            background: linear-gradient(135deg, var(--offwhite) 0%, var(--white) 100%);
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            color: var(--navy);
            margin-bottom: 24px;
        }

        .hero h1 span {
            color: var(--teal);
        }

        .hero p {
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 32px;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-primary {
            background: var(--coral);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-outline {
            background: transparent;
            color: var(--teal);
            border-color: var(--teal);
        }

        .btn-outline:hover {
            background: var(--teal);
            color: var(--white);
        }

        .hero-image {
            position: relative;
        }

        .hero-image img {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            border: 4px solid var(--teal);
            box-shadow: var(--shadow-lg);
        }

        /* Trust Bar */
        .trust-bar {
            padding: 32px 0;
            background: var(--navy);
            color: var(--white);
            text-align: center;
        }

        .trust-bar p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Sections */
        section {
            padding: 80px 0;
        }

        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .section-header h2 {
            font-size: 42px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 16px;
        }

        .section-header p {
            font-size: 18px;
            color: var(--gray);
        }

        /* Services */
        .services {
            background: var(--offwhite);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--white);
            padding: 32px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: var(--teal);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--white);
            font-size: 24px;
        }

        .card h3 {
            font-size: 22px;
            margin-bottom: 12px;
            color: var(--navy);
        }

        .card p {
            color: var(--gray);
        }

        /* Real Estate AI */
        .use-cases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .use-case {
            text-align: center;
        }

        .use-case-icon {
            width: 64px;
            height: 64px;
            background: var(--coral);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--white);
            font-size: 28px;
        }

        .use-case h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* How It Works */
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .step {
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 56px;
            height: 56px;
            background: var(--teal);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 auto 20px;
        }

        .step h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* Pricing */
        .pricing {
            background: var(--offwhite);
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 32px;
            margin-top: 40px;
        }

        .pricing-card {
            background: var(--white);
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            position: relative;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .pricing-card:hover {
            transform: translateY(-4px);
        }

        .pricing-card.popular {
            border-color: var(--coral);
            transform: scale(1.05);
        }

        .popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--coral);
            color: var(--white);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .pricing-card h3 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .pricing-card .subtitle {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .price {
            margin-bottom: 24px;
        }

        .price-amount {
            font-size: 36px;
            font-weight: 800;
            color: var(--navy);
        }

        .price-period {
            color: var(--gray);
            font-size: 16px;
        }

        .features {
            list-style: none;
            margin-bottom: 32px;
        }

        .features li {
            padding: 8px 0;
            color: var(--gray);
            display: flex;
            align-items: start;
            gap: 8px;
        }

        .features li::before {
            content: "✓";
            color: var(--teal);
            font-weight: 700;
            flex-shrink: 0;
        }

        .pricing-note {
            text-align: center;
            margin-top: 40px;
            color: var(--gray);
            font-size: 14px;
        }

        /* About */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 60px;
            align-items: center;
